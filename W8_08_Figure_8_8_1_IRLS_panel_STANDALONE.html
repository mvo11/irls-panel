            var lamHat=parkLambda(data,fits["Poisson (lambda 1)"]);
            var s2="Poisson"; if(!isNaN(lamHat)){if(lamHat<0.5)s2="Gaussian";else if(lamHat<1.5)s2="Poisson";else s2="Gamma";}
            readout.innerHTML="<strong>Synthetic panel.</strong> Modified Park lambda from the Poisson fit: "
              +(isNaN(lamHat)?"n/a":lamHat.toFixed(2))+" &rarr; data-preferred family: <strong style='color:#c8102e'>"+s2+"</strong>. "
              +"True theta fixed at 5.0. "+(nDropped>0?"Gamma dropped "+nDropped+" non-positive draw(s). ":"")
              +"Move the sliders: the three lines coincide near lambda 1 and separate as the variance power or the zero-tariff share rises.";
        } else {
            var p=meta.panel;
            readout.innerHTML="<strong>Real data: "+sectorSel.value+", "+p.year+".</strong> "
              +"<strong>Authoritative full-panel estimate (exporter and importer fixed effects, "+p.n_full.toLocaleString()+" observations):</strong> "
              +"theta = <strong style='color:#c8102e'>"+p.theta_poisson_full.toFixed(2)+"</strong>, "
              +"modified-Park lambda = <strong style='color:#c8102e'>"+p.lambda_full.toFixed(2)+"</strong> (near 2: the data favour the Gamma variance regime, not Poisson). "
              +"Tariff-bearing share: "+Math.round(p.bearing_share_full*100)+"&#37;. "
              +(nDropped>0?"Gamma dropped "+nDropped+" non-positive point(s). ":"")
              +"<br><em>The three lines above are a pooled fit to a "+data.length+"-point sample shown for illustration; they omit the fixed effects and so do not equal the full-panel theta. The headline theta and lambda are the real fixed-effects estimates.</em>";
        }
    }

    sectorSel.addEventListener("change", draw);
    lamSlider.addEventListener("input", draw);
    zeroSlider.addEventListener("input", draw);
    draw();
})();
</script>
</body>
</html>
